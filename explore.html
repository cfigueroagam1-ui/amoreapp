<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMORA - Explorar</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="icon" type="image/svg+xml" href="assets/img/logo.svg">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            amora: {
              primary: '#FF3B5C',
              medium: '#FF6B81',
              light: '#FF9AA2',
              dark: '#1E1E1E',
              bg: '#F7F7F7',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="app-container w-full bg-white flex flex-col justify-between overflow-hidden shadow-premium min-h-screen">
    
    <!-- Header injected by components.js -->
    <header id="global-header"></header>

    <!-- Main Stack Wrapper -->
    <main class="flex-grow flex flex-col justify-between px-6 pt-4 pb-6 relative">
      
      <!-- Card Stack Container -->
      <div id="card-stack" class="relative w-full flex-grow flex items-center justify-center min-h-[460px] h-[520px]">
        <!-- Skeleton Card Loading initially -->
        <div class="swipe-card bg-white border border-gray-100 shadow-card flex flex-col justify-between skeleton pointer-events-none">
          <div class="w-full h-[75%] bg-gray-200"></div>
          <div class="p-6 bg-white flex-grow space-y-3">
            <div class="h-6 w-1/3 rounded-full bg-gray-200"></div>
            <div class="h-3 w-1/4 rounded-full bg-gray-200"></div>
            <div class="h-4 w-5/6 rounded-full bg-gray-200"></div>
          </div>
        </div>
      </div>

      <!-- Action Buttons Row -->
      <div id="action-buttons-row" class="hidden flex items-center justify-center gap-6 mt-6 z-10">
        
        <!-- Dislike Button -->
        <button id="btn-dislike" class="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-lg border border-gray-100 hover:scale-105 active:scale-90 transition duration-150 text-gray-500 hover:text-rose-500 focus:outline-none">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>

        <!-- Super Like (Favorite) Button -->
        <button id="btn-super" class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-lg border border-gray-100 hover:scale-105 active:scale-90 transition duration-150 text-gray-500 hover:text-blue-500 focus:outline-none">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6.5 w-6.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.907c.961 0 1.36 1.25.588 1.81l-3.97 2.883a1 1 0 00-.364 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.971-2.883a1 1 0 00-1.176 0l-3.97 2.883c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.364-1.118l-3.97-2.883c-.773-.56-.375-1.81.587-1.81H9.682a1 1 0 00.95-.69l1.519-4.674z" />
          </svg>
        </button>

        <!-- Like Button -->
        <button id="btn-like" class="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-lg border border-gray-100 hover:scale-105 active:scale-90 transition duration-150 text-amora-primary hover:brightness-95 focus:outline-none">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 fill-current" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"/>
          </svg>
        </button>
        
      </div>

    </main>

    <!-- Footer injected by components.js -->
    <footer id="global-footer"></footer>

  </div>

  <!-- Database & Components -->
  <script src="assets/js/mockData.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/main.js"></script>
  <!-- Swipe Logic -->
  <script src="assets/js/swipe.js"></script>
  
  <script>
    let cardStack = null;

    window.addEventListener('DOMContentLoaded', () => {
      // Simulate loading skeleton for 1.2s
      setTimeout(() => {
        const actionRow = document.getElementById('action-buttons-row');
        actionRow.classList.remove('hidden');

        // Initialize Swipe Stack
        cardStack = new window.SwipeCardStack('card-stack', window.AMORA_DATA.profiles, (actionType, profile) => {
          handleSwipeCallback(actionType, profile);
        });

      }, 1200);

      // Bind button events
      document.getElementById('btn-dislike').addEventListener('click', () => {
        if (cardStack) cardStack.triggerSwipeLeft();
      });

      document.getElementById('btn-like').addEventListener('click', () => {
        if (cardStack) cardStack.triggerSwipeRight();
      });

      document.getElementById('btn-super').addEventListener('click', () => {
        if (cardStack) cardStack.triggerSwipeUp();
      });
    });

    // Handle Swipe Actions and match simulation
    function handleSwipeCallback(actionType, profile) {
      if (actionType === 'like' || actionType === 'super') {
        // 35% probability of a Match
        const isMatch = Math.random() < 0.35;
        
        if (isMatch) {
          // Play Match animation sound or modal
          setTimeout(() => {
            // Check if profile is already in chats, if not add it
            const chats = window.AMORA_DATA.chats;
            const chatExists = chats.some(c => c.profileId === profile.id);
            
            if (!chatExists) {
              const newChat = {
                id: Date.now(),
                profileId: profile.id,
                name: profile.name,
                avatar: profile.image,
                lastMessage: "¡Acaban de emparejarse! Di hola 👋",
                time: "Ahora",
                unread: true,
                messages: [
                  { sender: "them", text: `¡Hola! Me alegro de que hayamos conectado. ¿Qué tal? 😊`, time: "Ahora" }
                ],
                responses: [
                  "¡Oye! Qué bien. Justo estaba pensando en escribirte.",
                  "Jajaja, me alegro de que nos hayamos dado like. ¿Qué planes tienes hoy?",
                  "¡Hola! Dime, ¿te apetece hacer algo divertido esta semana?"
                ]
              };
              chats.unshift(newChat);
              
              // Also add to notifications
              window.AMORA_DATA.notifications.unshift({
                id: Date.now(),
                type: "match",
                title: `¡Nuevo Match con ${profile.name}!`,
                body: `¡Es mutuo! Habla con ${profile.name} ahora mismo.`,
                time: "Ahora",
                read: false,
                avatar: profile.image
              });
              
              // Refresh notification count on header
              window.initNavigation();
            }

            window.showMatchModal(profile, 
              // Send message redirect
              () => {
                window.location.href = `messages.html?chatId=${profile.id}`;
              },
              // Keep swiping
              () => {
                window.showToast(`¡Match con ${profile.name} guardado en mensajes!`, "success");
              }
            );
          }, 400);
        } else {
          window.showToast(`Le diste Like a ${profile.name}`, "success");
        }
      } else {
        window.showToast(`Descartado: ${profile.name}`, "info");
      }
    }
  </script>
</body>
</html>
