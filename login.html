<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMORA - Iniciar Sesión</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="icon" type="image/svg+xml" href="assets/img/logo.svg">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            amora: {
              primary: '#FF3B5C',
              medium: '#FF6B81',
              light: '#FF9AA2',
              dark: '#1E1E1E',
              bg: '#F7F7F7',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="app-container w-full bg-white flex flex-col justify-between overflow-hidden shadow-premium relative min-h-screen">
    
    <!-- Top Decorative Gradient Header -->
    <div class="bg-amora-grad h-44 w-full flex flex-col items-center justify-center relative overflow-hidden rounded-b-[40px]">
      <div class="absolute w-40 h-40 bg-white opacity-5 rounded-full -top-10 -left-10 floating-bubble-1"></div>
      <div class="absolute w-32 h-32 bg-white opacity-5 rounded-full -bottom-10 -right-10 floating-bubble-2"></div>
      
      <!-- Brand Logo -->
      <div class="z-10 flex flex-col items-center">
        <img src="assets/img/logo.svg" alt="AMORA Logo" class="w-16 h-16 drop-shadow-md brightness-0 invert">
        <h2 class="text-2xl font-extrabold tracking-wider text-white uppercase mt-2">AMORA</h2>
      </div>
    </div>

    <!-- Main Content (Form) -->
    <div class="flex-grow px-8 pt-10 pb-6 flex flex-col justify-center">
      <div class="text-center mb-8">
        <h3 class="text-2xl font-bold text-gray-800">¡Hola de nuevo!</h3>
        <p class="text-gray-500 text-sm mt-1">Ingresa tus datos para continuar buscando el amor</p>
      </div>

      <form id="login-form" class="space-y-6">
        <!-- Email Input -->
        <div class="relative">
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2" for="email">Correo Electrónico</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206" />
              </svg>
            </span>
            <input type="email" id="email" required placeholder="tuemail@ejemplo.com" 
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-amora-primary focus:ring-2 focus:ring-amora-light/30 transition duration-200 text-gray-800 placeholder-gray-400 bg-gray-50/50" />
          </div>
        </div>

        <!-- Password Input -->
        <div class="relative">
          <div class="flex justify-between items-center mb-2">
            <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider" for="password">Contraseña</label>
            <a href="#" class="text-xs font-medium text-amora-primary hover:underline">¿La olvidaste?</a>
          </div>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </span>
            <input type="password" id="password" required placeholder="••••••••" 
              class="w-full pl-10 pr-12 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-amora-primary focus:ring-2 focus:ring-amora-light/30 transition duration-200 text-gray-800 placeholder-gray-400 bg-gray-50/50" />
            <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none">
              <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit Button & Loader -->
        <button type="submit" id="submit-btn" 
          class="w-full bg-amora-grad hover:brightness-105 active:scale-[0.98] text-white font-bold py-4 rounded-2xl shadow-premium transition duration-200 flex items-center justify-center">
          <span>Iniciar Sesión</span>
          <div id="loader" class="hidden w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin ml-3"></div>
        </button>
      </form>

      <!-- Divider -->
      <div class="relative flex py-5 items-center">
        <div class="flex-grow border-t border-gray-200"></div>
        <span class="flex-shrink mx-4 text-gray-400 text-xs font-semibold uppercase tracking-wider">o ingresa con</span>
        <div class="flex-grow border-t border-gray-200"></div>
      </div>

      <!-- Social Logins -->
      <div class="grid grid-cols-2 gap-4">
        <button class="flex items-center justify-center gap-2 border border-gray-200 hover:bg-gray-50 active:scale-[0.97] py-3 px-4 rounded-2xl transition duration-150 text-gray-600 font-semibold text-sm">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12.24 10.285V13.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.859-3.578-7.859-8s3.53-8 7.859-8c2.46 0 4.105 1.025 5.047 1.926l2.427-2.334C17.955 2.192 15.34 1 12.24 1 6.033 1 1 6.033 1 12.24s5.033 11.24 11.24 11.24c6.478 0 10.793-4.537 10.793-10.986 0-.745-.08-1.3-.175-1.854H12.24z"/>
          </svg>
          Google
        </button>
        <button class="flex items-center justify-center gap-2 border border-gray-200 hover:bg-gray-50 active:scale-[0.97] py-3 px-4 rounded-2xl transition duration-150 text-gray-600 font-semibold text-sm">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          Facebook
        </button>
      </div>
    </div>

    <!-- Toast Notification Container (Simulated toast system) -->
    <div id="toast-container" class="absolute top-4 left-4 right-4 z-50 pointer-events-none"></div>

    <!-- Bottom Footer Redirect -->
    <div class="py-6 bg-gray-50 border-t border-gray-100 text-center text-sm rounded-t-[30px]">
      <span class="text-gray-500">¿No tienes una cuenta?</span>
      <a href="register.html" class="text-amora-primary font-bold ml-1 hover:underline">Regístrate</a>
    </div>

  </div>

  <script>
    // Toggle Password Visibility
    const toggleBtn = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eye-icon');

    toggleBtn.addEventListener('click', () => {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        // Eye off icon
        eyeIcon.innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
        `;
      } else {
        passwordInput.type = 'password';
        // Eye icon
        eyeIcon.innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        `;
      }
    });

    // Toast Alert Function
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      const colors = type === 'success' 
        ? 'bg-emerald-500 text-white shadow-emerald-200' 
        : 'bg-rose-500 text-white shadow-rose-200';
        
      toast.className = `p-4 mb-3 rounded-2xl flex items-center justify-between shadow-lg transform translate-y-[-20px] opacity-0 transition-all duration-300 pointer-events-auto ${colors}`;
      toast.innerHTML = `
        <div class="flex items-center gap-3">
          ${type === 'success' ? `
            <svg class="w-5 h-5 fill-current" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
            </svg>
          ` : `
            <svg class="w-5 h-5 fill-current" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
          `}
          <span class="text-sm font-semibold">${message}</span>
        </div>
      `;
      
      container.appendChild(toast);
      
      // Trigger animation
      setTimeout(() => {
        toast.classList.remove('translate-y-[-20px]', 'opacity-0');
      }, 10);
      
      // Auto-remove
      setTimeout(() => {
        toast.classList.add('translate-y-[-20px]', 'opacity-0');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // Handle Login Submit
    const loginForm = document.getElementById('login-form');
    const submitBtn = document.getElementById('submit-btn');
    const loader = document.getElementById('loader');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      
      // Show Loader and disable button
      loader.classList.remove('hidden');
      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-90');
      
      // Simulate validation / backend call
      setTimeout(() => {
        showToast("¡Inicio de sesión exitoso! Redirigiendo...", "success");
        
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1200);
      }, 1500);
    });
  </script>
</body>
</html>
